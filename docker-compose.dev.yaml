services:
  postgres:
    image: postgres:15-alpine
    container_name: my-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs-app:
    image: node:20-alpine
    container_name: my-nextjs-app-dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
      - next_cache:/app/.next
    command: sh -c "npm ci && npx prisma generate --schema=./prisma/schema.prisma && npm run dev -- -H 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_dev:
  next_node_modules:
  next_cache:
